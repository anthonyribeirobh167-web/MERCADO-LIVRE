  const segmentos = [

  const PREMIO_INDEX = 3;
  const anguloPorSeg = (Math.PI * 2) / segmentos.length;
  
  function desenharRoleta() {
    const centroX = canvas.width/2, centroY = canvas.height/2, raio = canvas.width * 0.42;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i=0; i<segmentos.length; i++) {
      let inicio = i * anguloPorSeg + anguloAtual;
      let fim = inicio + anguloPorSeg;
      ctx.beginPath();
      ctx.moveTo(centroX,centroY);
      ctx.arc(centroX,centroY,raio,inicio,fim);
      ctx.fillStyle = segmentos[i].cor;
      ctx.fill();
      ctx.save();
      ctx.translate(centroX,centroY);
      ctx.rotate(inicio + anguloPorSeg/2);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 12px 'Segoe UI', system-ui";
      ctx.shadowBlur = 0;
      let txt = segmentos[i].label;
      if(txt.length > 12) txt = txt.slice(0,10)+"..";
      ctx.fillText(txt, raio*0.62, 6);
      if(segmentos[i].desconto && segmentos[i].desconto !== "Frete Grátis") {
        ctx.font = "bold 9px 'Segoe UI'";
        ctx.fillStyle = "#fff8e0";
        ctx.fillText(segmentos[i].desconto, raio*0.62, 22);
      }
      ctx.restore();
    }
    ctx.beginPath();
    ctx.moveTo(centroX-12, centroY-raio-8);
    ctx.lineTo(centroX, centroY-raio+6);
    ctx.lineTo(centroX+12, centroY-raio-8);
    ctx.fillStyle = "#ffea80";
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(centroX-6, centroY-raio-12);
    ctx.lineTo(centroX, centroY-raio-2);
    ctx.lineTo(centroX+6, centroY-raio-12);
    ctx.fillStyle = "#ffb347";
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  
  function girarRoleta() {
    if(girando || jaGirou) return;
    jaGirou = true;
    girando = true;
    const anguloAlvoSegmento = PREMIO_INDEX;
    const anguloSeta = -Math.PI/2;
    const anguloCentral = anguloAlvoSegmento * anguloPorSeg + (anguloPorSeg/2);
    let anguloFinalBase = anguloSeta - anguloCentral;
    anguloFinalBase = ((anguloFinalBase % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const voltas = 10;
    let anguloInicial = anguloAtual;
    let anguloFinal = anguloFinalBase + (voltas * 2 * Math.PI);
    const duracao = 2100;
    const inicio = performance.now();
    function step(now) {
      let elapsed = now - inicio;
      let t = Math.min(1, elapsed/duracao);
      let ease = 1 - Math.pow(1-t, 3);
      let novoAngulo = anguloInicial + (anguloFinal - anguloInicial) * ease;
      anguloAtual = novoAngulo % (2*Math.PI);
      desenharRoleta();
      if(t<1) animFrame = requestAnimationFrame(step);
      else {
        girando = false;
        anguloAtual = anguloFinalBase % (2*Math.PI);
        desenharRoleta();
        giroConcluido = true;
        btnGirar.disabled = true;
        btnGirar.style.display = 'none';
        btnLiberarOferta.style.display = 'block';
        console.log('🎡 Roleta concluída - 80% OFF garantido!');
        cancelAnimationFrame(animFrame);
      }
    }
    animFrame = requestAnimationFrame(step);
  }

        🚚 FRETE GRÁTIS para todo Brasil • Entrega Rápida
      </div>
      
      <div class="detail-description">
        <h3>📋 Sobre o produto:</h3>
        <ul>
          ${descricoesAirFryer.map(item => `<li>${item}</li>`).join('')}
        </ul>
      </div>
      
      <div class="persuasive-description">
        <h3>💎 POR QUE VOCÊ PRECISA DESTE PRODUTO?</h3>
        <p>${descricaoParaHTML}</p>
        <div class="highlight">
          ⚠️ ATENÇÃO: Esta oferta com 80% OFF + FRETE GRÁTIS é válida apenas para as primeiras 100 unidades!
        </div>
      </div>
      
      <div class="comments-section">
        <div class="comments-title">
          ⭐ Avaliações dos Clientes 
          <span>${mediaEstrelas} ★</span>
        </div>
        <div class="rating-summary">
          <div class="rating-average">${mediaEstrelas} ★</div>
          <div style="color:#666;">${comentarios.length} avaliações • 98% recomendam</div>
        </div>
        ${comentariosHTML}
      </div>
      
      <button class="btn-comprar-agora" data-url="${linkReal}" data-produto="${produto.nome}" data-valor="${produto.final}">
        🛒 COMPRAR AGORA COM ${produto.desconto} OFF
      </button>
      <div class="detail-guarantee">
        🔒 Compra 100% segura • Garantia de 7 dias • Parcele em até 6x
      </div>
    `;
    
    // Evento do botão voltar dentro da tela de detalhe
    const btnVoltarDetalhe = detailContainer.querySelector('#btnVoltarDetalhe');
    btnVoltarDetalhe.addEventListener('click', fecharDetalhes);
    
    // Evento do botão comprar
    const btnComprar = detailContainer.querySelector('.btn-comprar-agora');
    btnComprar.addEventListener('click', (e) => {
      e.stopPropagation();
      
      const produtoData = {
        nome: produto.nome,
        final: produto.final,
        original: produto.original
      };
      
      dispararAddToCart(produtoData, btnComprar);
      dispararInitiateCheckout(produtoData);
      
      const url = btnComprar.getAttribute('data-url');
      if(url && url !== "#") {
        dispararCompletePayment(produtoData);
        window.open(url, '_blank');
      } else {
        alert("Link promocional disponível em breve!");
      }
    });
    
    detailOverlay.classList.add('ativo');
    document.body.style.overflow = 'hidden';
  }
  
  // Função para renderizar o catálogo - CORRIGIDA
  function renderizarCatalogo() {
    const container = document.getElementById('catalogoContainer');
    if(!container) return;
    container.innerHTML = '';
    
    for(let cat of catalogoData) {
      const section = document.createElement('section');
      section.className = 'category-section';
      const title = document.createElement('h2');
      title.className = 'category-title';
      title.innerText = cat.categoria;
      section.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'products-grid';
      
      for(let prod of cat.produtos) {
        const card = document.createElement('div');
        card.className = 'product-card';
        
        // Criar o card sem usar JSON.stringify no data-produto para evitar problemas
        const produtoData = {
          nome: prod.nome,
          original: prod.original,
          final: prod.final,
          img: prod.img,
          desconto: prod.desconto
        };
        
        card.innerHTML = `
          <div class="product-img"><img src="${prod.img}" alt="${prod.nome}" loading="lazy" onerror="this.src='https://picsum.photos/id/20/200/200'"></div>
          <div class="product-info">
            <div class="product-title">${prod.nome}</div>
            <div class="big-discount">⚡ ${prod.desconto} OFF ⚡</div>
            <div class="price-row">
              <span class="old-price">R$ ${prod.original.toFixed(2)}</span>
              <span class="discount-price">R$ ${prod.final.toFixed(2)}</span>
            </div>
            <div class="free-ship">🚚 FRETE GRÁTIS</div>
            <button class="btn-view">👁️ VER PRODUTO</button>
          </div>
        `;
        
        const btn = card.querySelector('.btn-view');
        // Armazenar os dados do produto diretamente no botão
        btn.produtoData = produtoData;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          console.log("Botão clicado para:", btn.produtoData.nome);
          abrirDetalhes(btn.produtoData);
        });
        
        grid.appendChild(card);
      }
      section.appendChild(grid);
      container.appendChild(section);
    }
    
    const banner = document.getElementById('promoBanner');
    if(banner) banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  // Evento de busca
  const searchInput = document.querySelector('.nav-search-input');
  const searchBtn = document.querySelector('.nav-search-btn');
  
  searchBtn.addEventListener('click', () => {
    const termo = searchInput.value.trim();
    if (termo) {
      dispararSearch(termo);
      alert(`Buscando por: "${termo}"\nEvento de busca enviado ao TikTok Pixel!`);
    }
  });
  
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const termo = searchInput.value.trim();
      if (termo) {
        dispararSearch(termo);
        alert(`Buscando por: "${termo}"\nEvento de busca enviado ao TikTok Pixel!`);
      }
    }
  });
  
  window.addEventListener('DOMContentLoaded', () => {
    exibirRoleta();
    
    btnGirar.addEventListener('click', () => { 
      if(!girando && !jaGirou) {
        girarRoleta();
      } else if(jaGirou) {
        alert("🎉 Você já girou! Clique em 'LIBERAR OFERTA' para ver os produtos com 80% OFF.");
      } 
    });
    
    btnLiberarOferta.addEventListener('click', () => { 
      if(giroConcluido || jaGirou) {
        liberarCatalogo();
      } else { 
        alert("⚡ Gire a roleta primeiro para liberar as ofertas de 80% OFF!"); 
      }
    });
    
    updateDebug('Pixel carregado - Pronto para rastrear!', 'info');
  });
</script>
