  function renderizarCatalogo() {
    const container = document.getElementById('catalogoContainer');
    if(!container) return;
    container.innerHTML = '';
    for(let cat of catalogoData) {
      const section = document.createElement('section');
      section.className = 'category-section';
      const title = document.createElement('h2');
      title.className = 'category-title';
      title.innerText = cat.categoria;
      section.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'products-grid';
      for(let prod of cat.produtos) {
        const card = document.createElement('div');
        card.className = 'product-card';
        const linkReal = linksProdutos[prod.nome] || "#";
        card.innerHTML = `
          <div class="product-img"><img src="${prod.img}" alt="${prod.nome}" loading="lazy" onerror="this.src='https://picsum.photos/id/20/200/200'"></div>
          <div class="product-info">
            <div class="product-title">${prod.nome}</div>
            <div class="big-discount">⚡ ${prod.desconto} OFF ⚡</div>
            <div class="price-row">
              <span class="old-price">R$ ${prod.original.toFixed(2)}</span>
              <span class="discount-price">R$ ${prod.final.toFixed(2)}</span>
            </div>
            <div class="free-ship">🚚 FRETE GRÁTIS</div>
            <button class="btn-buy" data-url="${linkReal}" data-produto="${prod.nome}" data-valor="${prod.final}">COMPRAR COM 80% OFF</button>
          </div>
        `;
        const btn = card.querySelector('.btn-buy');
        
        // ==============================================
        // EVENTO 2: AddToCart - Disparado quando clica no botão de compra
        // ==============================================
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          
          // DISPARA O EVENTO ADDTOCART PARA O TIKTOK PIXEL
          if (typeof ttq !== 'undefined') {
            ttq.track('AddToCart', {
              content_id: 'D7TEIHJC77U2TFGF5MH0',
              content_type: 'product',
              value: prod.final,
              currency: 'BRL'
            });
            console.log('🛒 TikTok Pixel - Evento AddToCart disparado!');
            console.log('   content_id: D7TEIHJC77U2TFGF5MH0, value: R$ ' + prod.final);
          } else {
            console.warn('⚠️ TikTok Pixel não encontrado!');
          }
          
          // DISPARA O EVENTO ADDTOCART PARA O META PIXEL (FACEBOOK)
          if (typeof fbq !== 'undefined') {
            fbq('track', 'AddToCart', { 
              value: prod.final, 
              currency: 'BRL', 
              content_name: prod.nome, 
              content_type: 'product' 
            });
            console.log('💰 Meta Pixel - AddToCart disparado para:', prod.nome);
          }
          
          // ABRE O LINK DO PRODUTO
          const url = btn.getAttribute('data-url');
          if(url && url !== "#") {
            window.open(url, '_blank');
          } else {
            alert("Link promocional disponível em breve!");
          }
        });
        
        grid.appendChild(card);
      }
      section.appendChild(grid);
      container.appendChild(section);
    }
    const banner = document.getElementById('promoBanner');
    if(banner) banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
