<div id="overlay" class="overlay">

    <button class="btn-girar" onclick="girar()">GIRAR</button>

  </div>

<script>

// 🎯 VIEW CONTENT GLOBAL
ttq.track('ViewContent', {content_type:'product_group'});

// ROLETA
let girou = false;

function girar(){
  if(girou) return;

  girou = true;

  ttq.track('ClickButton',{content_name:'girar_roleta'});

  alert("🎉 Você ganhou FRETE GRÁTIS!");
  document.getElementById('btnProdutos').style.display='block';
}

// MOSTRAR PRODUTOS
function mostrar(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('produtos').style.display='block';
}

// COMPRA
function comprar(id, valor){

  ttq.track('ClickButton',{content_name:id});

  ttq.track('InitiateCheckout',{
    contents:[{content_id:id, quantity:1, price:valor}],
    value:valor,
    currency:'BRL'
  });

  alert("Redirecionando...");
}

</script>
