  ];
  const PREMIO_INDEX = 4;
  const anguloPorSeg = (Math.PI * 2) / segmentos.length;
  
  function desenharRoleta() {
    const centroX = canvas.width/2, centroY = canvas.height/2, raio = canvas.width * 0.42;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i=0; i<segmentos.length; i++) {
      let inicio = i * anguloPorSeg + anguloAtual;
      let fim = inicio + anguloPorSeg;
      ctx.beginPath();
      ctx.moveTo(centroX,centroY);
      ctx.arc(centroX,centroY,raio,inicio,fim);
      ctx.fillStyle = segmentos[i].cor;
      ctx.fill();
      ctx.save();
      ctx.translate(centroX,centroY);
      ctx.rotate(inicio + anguloPorSeg/2);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 12px 'Segoe UI', system-ui";
      let txt = segmentos[i].label;
      if(txt.length > 12) txt = txt.slice(0,10)+"..";
      ctx.fillText(txt, raio*0.62, 6);
      ctx.restore();
    }
    ctx.beginPath();
    ctx.moveTo(centroX-12, centroY-raio-8);
    ctx.lineTo(centroX, centroY-raio+6);
    ctx.lineTo(centroX+12, centroY-raio-8);
    ctx.fillStyle = "#ffea80";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(centroX-6, centroY-raio-12);
    ctx.lineTo(centroX, centroY-raio-2);
    ctx.lineTo(centroX+6, centroY-raio-12);
    ctx.fillStyle = "#ffb347";
    ctx.fill();
  }

    // 🎯 EVENTO: ClickButton
    window.tiktokEvents.clickButton('girar_roleta');
    
    jaGirou = true;
    girando = true;
    const anguloAlvoSegmento = PREMIO_INDEX;
    const anguloSeta = -Math.PI/2;
    const anguloCentral = anguloAlvoSegmento * anguloPorSeg + (anguloPorSeg/2);
    let anguloFinalBase = anguloSeta - anguloCentral;
    anguloFinalBase = ((anguloFinalBase % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const voltas = 10;
    let anguloInicial = anguloAtual;
    let anguloFinal = anguloFinalBase + (voltas * 2 * Math.PI);
    const duracao = 2100;
    const inicio = performance.now();
    function step(now) {
      let elapsed = now - inicio;
      let t = Math.min(1, elapsed/duracao);
      let ease = 1 - Math.pow(1-t, 3);
      let novoAngulo = anguloInicial + (anguloFinal - anguloInicial) * ease;
      anguloAtual = novoAngulo % (2*Math.PI);
      desenharRoleta();
      if(t<1) animFrame = requestAnimationFrame(step);
      else {
        girando = false;
        anguloAtual = anguloFinalBase % (2*Math.PI);
        desenharRoleta();
        giroConcluido = true;
        btnGirar.disabled = true;
        btnGirar.textContent = "✅ FRETE GRÁTIS GARANTIDO! ✅";
        btnMega.style.display = "block";
        cancelAnimationFrame(animFrame);
      }
    }
    animFrame = requestAnimationFrame(step);
  }
  
  function exibirRoleta() {
    overlay.classList.add('ativo');
    anguloAtual = Math.random() * 2 * Math.PI;
    desenharRoleta();
    jaGirou = false; 
    giroConcluido = false;
    btnGirar.disabled = false;
    btnGirar.textContent = "🌀 GIRAR ROLETA AGORA 🌀";
    btnMega.style.display = "none";
  }
  
  function fecharRoletaEMostrarCatalogo() {
    overlay.classList.remove('ativo');
    btnMega.style.display = "none";
    document.getElementById('promoBanner').style.display = 'block';
    renderizarCatalogo();
  }

  let produtosRenderizados = false;
  let currentFilter = '';
  
  function renderizarCatalogo() {
    const container = document.getElementById('catalogoContainer');
    if(!container) return;
    container.innerHTML = '';
    
    let produtosFiltrados = [];
    for(let cat of catalogoData) {
      for(let prod of cat.produtos) {
        produtosFiltrados.push({ ...prod, categoria: cat.categoria });
      }
    }
    
    if (currentFilter) {
      produtosFiltrados = produtosFiltrados.filter(p => 
        p.nome.toLowerCase().includes(currentFilter.toLowerCase()) ||
        p.categoria.toLowerCase().includes(currentFilter.toLowerCase())
      );
    }
    
    if (produtosFiltrados.length === 0) {
      container.innerHTML = '<div class="no-results">🔍 Nenhum produto encontrado. Tente outra busca!</div>';
      return;
    }
    
    const produtosPorCategoria = {};
    for(let prod of produtosFiltrados) {
      if (!produtosPorCategoria[prod.categoria]) produtosPorCategoria[prod.categoria] = [];
      produtosPorCategoria[prod.categoria].push(prod);
    }
    
    for(let catNome in produtosPorCategoria) {
      const section = document.createElement('section');
      section.className = 'category-section';
      const title = document.createElement('h2');
      title.className = 'category-title';
      title.innerText = catNome;
      section.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'products-grid';
      
      for(let prod of produtosPorCategoria[catNome]) {
        const card = document.createElement('div');
        card.className = 'product-card';
        const linkReal = linksProdutos[prod.nome] || "#";
        const productId = prod.nome.replace(/\s+/g, '_').toLowerCase();
        
        card.innerHTML = `
          <div class="product-img"><img src="${prod.img}" alt="${prod.nome}" loading="lazy"></div>
          <div class="product-info">
            <div class="product-title">${prod.nome}</div>
            <div class="price-row">
              <span class="old-price">R$ ${prod.original.toFixed(2)}</span>
              <span class="discount-price">R$ ${prod.final.toFixed(2)}</span>
            </div>
            <div class="free-ship">🚚 FRETE GRÁTIS</div>
            <button class="btn-buy" data-url="${linkReal}" data-produto="${prod.nome}" data-valor="${prod.final}" data-id="${productId}">COMPRAR AGORA</button>
          </div>
        `;
        
        const btn = card.querySelector('.btn-buy');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          
          const productName = btn.getAttribute('data-produto');
          const productPrice = parseFloat(btn.getAttribute('data-valor'));
          const productId = btn.getAttribute('data-id');
          
          // 🎯 EVENTO: InitiateCheckout
          window.tiktokEvents.initiateCheckout(productName, productId, productPrice, 1);
          
          const url = btn.getAttribute('data-url');
          if(url && url !== "#") {
            setTimeout(() => {
              window.open(url, '_blank');
            }, 100);
          } else {
            alert("Link promocional disponível em breve!");
          }
        });
        
        grid.appendChild(card);
      }
      section.appendChild(grid);
      container.appendChild(section);
    }
    
    // 🎯 EVENTO: ViewContent (apenas uma vez)
    if (!produtosRenderizados) {
      produtosRenderizados = true;
      for(let cat of catalogoData) {
        for(let prod of cat.produtos) {
          const productId = prod.nome.replace(/\s+/g, '_').toLowerCase();
          window.tiktokEvents.viewContent(prod.nome, productId, prod.final);
        }
      }
      console.log('📦 ViewContent disparado para todos os produtos');
    }
  }
  
  function filtrarProdutos() {
    currentFilter = document.getElementById('searchInput').value;
    renderizarCatalogo();
  }

  // Função para página de confirmação
  window.checkoutComplete = function(orderId, totalValue, products) {
    window.tiktokEvents.completePayment(orderId, totalValue, products);
  };

  // INICIALIZAÇÃO
  // ============================================
  window.addEventListener('DOMContentLoaded', () => {
    exibirRoleta();
    
    btnGirar.addEventListener('click', () => { 
      if(!girando && !jaGirou) {
        girarRoleta();
      } else if(jaGirou) {
        alert("🎉 Você já garantiu o frete grátis! Clique em 'VER PRODUTOS' para aproveitar.");
      }
    });
    
    btnMega.addEventListener('click', () => { 
      if(giroConcluido || jaGirou) {
        fecharRoletaEMostrarCatalogo();
      } else {
        alert("⚡ Gire a roleta primeiro para liberar os preços!");
      }
    });
    
    document.getElementById('searchBtn').addEventListener('click', filtrarProdutos);
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') filtrarProdutos();
    });
  });
